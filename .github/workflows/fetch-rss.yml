name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:        # permet de lancer manuellement

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and build news.json
        run: |
          python3 << 'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          SOURCES = [
            {"url": "https://feeds.reuters.com/reuters/technologyNews", "label": "Reuters Tech"},
            {"url": "https://www.silicon.fr/feed", "label": "Silicon.fr"},
            {"url": "https://www.zdnet.fr/feeds/rss/", "label": "ZDNet FR"},
            {"url": "https://www.lemondeinformatique.fr/flux-rss/thematique-toute-l-actualite.xml", "label": "LMI"},
            {"url": "https://feeds.reuters.com/Reuters/worldNews", "label": "Reuters Monde"},
          ]

          REGUL_SOURCES = [
            {"url": "https://www.ssi.gouv.fr/feed/", "label": "ANSSI"},
            {"url": "https://www.legifrance.gouv.fr/atom/jorf.xml", "label": "Legifrance"},
          ]

          NS = {'atom': 'http://www.w3.org/2005/Atom'}

          def fetch_feed(url, label):
            items = []
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=10) as r:
                content = r.read()
              root = ET.fromstring(content)

              # RSS 2.0
              for item in root.findall('.//item')[:6]:
                title = item.findtext('title', '').strip()
                link  = item.findtext('link', '').strip()
                date  = item.findtext('pubDate', '') or item.findtext('dc:date', '', {'dc': 'http://purl.org/dc/elements/1.1/'})
                if title and link:
                  items.append({"title": title, "link": link, "date": date, "source": label})

              # Atom
              if not items:
                for entry in root.findall('atom:entry', NS)[:6]:
                  title = entry.findtext('atom:title', '', NS).strip()
                  link_el = entry.find('atom:link', NS)
                  link = link_el.get('href','') if link_el is not None else ''
                  date = entry.findtext('atom:published', '', NS) or entry.findtext('atom:updated', '', NS)
                  if title and link:
                    items.append({"title": title, "link": link, "date": date, "source": label})
            except Exception as e:
              print(f"Erreur {label}: {e}")
            return items

          all_news = []
          for src in SOURCES:
            all_news += fetch_feed(src["url"], src["label"])

          all_regul = []
          for src in REGUL_SOURCES:
            all_regul += fetch_feed(src["url"], src["label"])

          output = {
            "updated": datetime.now(timezone.utc).isoformat(),
            "news": all_news[:20],
            "regul": all_regul[:8],
          }

          with open("news.json", "w", encoding="utf-8") as f:
            json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"OK — {len(all_news)} articles, {len(all_regul)} actu regul")
          EOF

      - name: Commit news.json
        run: |
          git config user.name  "StratWatch Bot"
          git config user.email "bot@stratwatch"
          git add news.json
          git diff --cached --quiet || git commit -m "Update news.json [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
