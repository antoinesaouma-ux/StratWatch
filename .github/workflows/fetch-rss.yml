name: Fetch RSS and Indices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch everything and build JSON files
        run: |
          python3 << 'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          NEWS_SOURCES = [
            {"url": "https://feeds.reuters.com/reuters/technologyNews", "label": "Reuters Tech",  "fiabilite": "élevée", "sources_count": 5},
            {"url": "https://www.silicon.fr/feed",                      "label": "Silicon.fr",    "fiabilite": "élevée", "sources_count": 3},
            {"url": "https://www.zdnet.fr/feeds/rss/",                  "label": "ZDNet FR",      "fiabilite": "élevée", "sources_count": 3},
            {"url": "https://www.lemondeinformatique.fr/flux-rss/thematique-toute-l-actualite.xml", "label": "LMI", "fiabilite": "élevée", "sources_count": 2},
            {"url": "https://feeds.reuters.com/Reuters/worldNews",      "label": "Reuters Monde", "fiabilite": "élevée", "sources_count": 5},
          ]
          REGUL_SOURCES = [
            {"url": "https://www.ssi.gouv.fr/feed/",               "label": "ANSSI",      "fiabilite": "élevée", "sources_count": 1},
            {"url": "https://www.legifrance.gouv.fr/atom/jorf.xml", "label": "Legifrance", "fiabilite": "élevée", "sources_count": 1},
          ]
          NS = {'atom': 'http://www.w3.org/2005/Atom'}

          def fetch_feed(src):
            items = []
            try:
              req = urllib.request.Request(src["url"], headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=12) as r:
                content = r.read()
              root = ET.fromstring(content)
              for item in root.findall('.//item')[:6]:
                title = (item.findtext('title') or '').strip()
                link  = (item.findtext('link')  or '').strip()
                date  = item.findtext('pubDate') or item.findtext('{http://purl.org/dc/elements/1.1/}date') or ''
                if title and link:
                  items.append({"title": title, "link": link, "date": date, "source": src["label"], "fiabilite": src["fiabilite"], "sources_count": src["sources_count"]})
              if not items:
                for entry in root.findall('atom:entry', NS)[:6]:
                  title = (entry.findtext('atom:title', '', NS) or '').strip()
                  link_el = entry.find('atom:link', NS)
                  link = link_el.get('href','') if link_el is not None else ''
                  date = entry.findtext('atom:published','',NS) or entry.findtext('atom:updated','',NS) or ''
                  if title and link:
                    items.append({"title": title, "link": link, "date": date, "source": src["label"], "fiabilite": src["fiabilite"], "sources_count": src["sources_count"]})
            except Exception as e:
              print(f"Erreur {src['label']}: {e}")
            return items

          all_news = []
          for src in NEWS_SOURCES:
            all_news += fetch_feed(src)
          all_news.sort(key=lambda x: x.get('date',''), reverse=True)

          all_regul = []
          for src in REGUL_SOURCES:
            all_regul += fetch_feed(src)
          all_regul.sort(key=lambda x: x.get('date',''), reverse=True)

          now = datetime.now(timezone.utc).isoformat()
          with open("news.json", "w", encoding="utf-8") as f:
            json.dump({"updated": now, "news": all_news[:20], "regul": all_regul[:8]}, f, ensure_ascii=False, indent=2)
          print(f"news.json OK — {len(all_news)} articles, {len(all_regul)} regul")

          SYMBOLS = {"eurusd": "EURUSD=X", "sox": "%5ESOX", "ndx": "%5ENDX"}
          indices = {"updated": now}
          for key, sym in SYMBOLS.items():
            try:
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{sym}?interval=1d&range=2d"
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json'})
              with urllib.request.urlopen(req, timeout=12) as r:
                data = json.load(r)
              meta  = data['chart']['result'][0]['meta']
              price = meta['regularMarketPrice']
              prev  = meta.get('chartPreviousClose') or meta.get('previousClose') or price
              pct   = (price - prev) / prev * 100 if prev else 0
              indices[key] = {"price": price, "prev": prev, "pct": round(pct, 3)}
              print(f"{key}: {price} ({pct:+.2f}%)")
            except Exception as e:
              print(f"Erreur indice {key}: {e}")
              indices[key] = None
          with open("indices.json", "w", encoding="utf-8") as f:
            json.dump(indices, f, ensure_ascii=False, indent=2)
          print("indices.json OK")
          EOF

      - name: Commit JSON files
        run: |
          git config user.name  "StratWatch Bot"
          git config user.email "bot@stratwatch"
          git add news.json indices.json
          git diff --cached --quiet || git commit -m "Update data [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
